document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ter-spacing:0.16em;text-transform:uppercase;color:#8a8a92;\">Density<\u002Fspan>\n        <input type=\"range\" min=\"1\" max=\"5\" step=\"1\" value=\"{{ density }}\" onchange=\"{{ onDensity }}\" oninput=\"{{ onDensity }}\" style=\"width:92px;accent-color:#e8e8ee;cursor:pointer;\">\n        <span style=\"font-size:12px;color:#e8e8ee;width:9px;text-align:center;font-variant-numeric:tabular-nums;\">{{ density }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:1px;height:24px;background:rgba(255,255,255,0.12);\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <span style=\"font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#8a8a92;\">Seed<\u002Fspan>\n        <input type=\"number\" min=\"1\" max=\"999\" step=\"1\" value=\"{{ seed }}\" onchange=\"{{ onSeed }}\" oninput=\"{{ onSeed }}\" style=\"width:52px;font-family:inherit;font-size:12px;color:#e8e8ee;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:8px;padding:7px 8px;text-align:center;font-variant-numeric:tabular-nums;-moz-appearance:textfield;\">\n        <button onclick=\"{{ shuffle }}\" title=\"Randomize seed\" style=\"display:flex;align-items:center;justify-content:center;width:34px;height:34px;font-size:15px;color:#cfcfd6;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;cursor:pointer;\" style-hover=\"background:rgba(255,255,255,0.13);color:#fff;\">↻<\u002Fbutton>\n      <\u002Fdiv>\n      <button onclick=\"{{ download }}\" style=\"font-family:inherit;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#0b0b0d;background:#e8e8ee;border:none;border-radius:9px;padding:8px 15px;cursor:pointer;font-weight:600;\" style-hover=\"background:#ffffff;\">Download 4K PNG<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1920,&quot;height&quot;:1080},&quot;palette&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Nocturne&quot;,&quot;Sandstone&quot;,&quot;Steel&quot;,&quot;Orchid&quot;,&quot;Ember&quot;,&quot;Cobalt&quot;,&quot;Pine&quot;,&quot;Citrus&quot;,&quot;Bubblegum&quot;,&quot;Lagoon&quot;],&quot;default&quot;:&quot;Nocturne&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:5,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Composition&quot;},&quot;seed&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:7,&quot;min&quot;:1,&quot;max&quot;:999,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Composition&quot;}}\">\nclass Component extends DCLogic {\n  canvasRef = React.createRef();\n  state = {};\n\n  PALETTES = {\n    Nocturne: { bg:'#14161e', bgAlt:'#1d2132', line:'#0d0e15',\n      colors:['#e8c15a','#d96c5a','#4a9d9c','#e7e3d8','#7d7fb3','#3a3f57'] },\n    Sandstone: { bg:'#ece4d6', bgAlt:'#e0d4bf', line:'#d8cbb6',\n      colors:['#c2562f','#d99a2b','#3c5a5a','#2b2b2b','#7a8b6f','#a8552f'] },\n    Steel: { bg:'#181b20', bgAlt:'#22272f', line:'#0f1115',\n      colors:['#d8dce2','#9aa3ad','#5b6470','#e0673b','#2f3540','#b8bec6'] },\n    Orchid: { bg:'#1a1320', bgAlt:'#241830', line:'#120c18',\n      colors:['#d98cc4','#6c4ad9','#4ad9c0','#f0e6f5','#e8a05a','#3a2a4a'] },\n    Ember: { bg:'#1c1310', bgAlt:'#2a1c15', line:'#100a07',\n      colors:['#f0a04b','#e6542f','#d6324e','#f5e8d0','#8a4a2c','#46271c'] },\n    Cobalt: { bg:'#0d1424', bgAlt:'#15203a', line:'#070c18',\n      colors:['#3b82d9','#4ad9d0','#e8e4d8','#f0843b','#2a4a8a','#1a2b4a'] },\n    Pine: { bg:'#101813', bgAlt:'#1a261d', line:'#090f0b',\n      colors:['#6cae5a','#3a9d7c','#d9b84a','#e8e4d2','#c2562f','#2a4030'] },\n    Citrus: { bg:'#f6f0e2', bgAlt:'#ece2c8', line:'#e0d4b6',\n      colors:['#e8541f','#6ca62c','#1f9ba6','#2a2d4a','#f0a81f','#b83a6a'] },\n    Bubblegum: { bg:'#fbe9ec', bgAlt:'#f6d4dc', line:'#f0c2cd',\n      colors:['#e84a7f','#6c4ad9','#3ac0a8','#f0a83b','#2a2d4a','#d6324e'] },\n    Lagoon: { bg:'#e4f0ee', bgAlt:'#cfe6e0', line:'#bfdbd4',\n      colors:['#1f8a8a','#43c0b8','#e8673b','#2a3d5a','#f0b53b','#d6456a'] },\n  };\n\n  rng(seed) {\n    let s = seed >>> 0;\n    return () => { s |= 0; s = (s + 0x6D2B79F5) | 0;\n      let t = Math.imul(s ^ (s >>> 15), 1 | s);\n      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;\n      return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };\n  }\n\n  draw() {\n    const cv = this.canvasRef.current; if (!cv) return;\n    const W = 3840, H = 2160; cv.width = W; cv.height = H;\n    const ctx = cv.getContext('2d');\n    const palName = this.state.palette ?? this.props.palette ?? 'Nocturne';\n    const pal = this.PALETTES[palName] || this.PALETTES.Nocturne;\n    const dens = this.state.density ?? this.props.density ?? 3;\n    const seed = (this.state.seed ?? this.props.seed ?? 7) * 2654435761 + palName.length * 911;\n    const rnd = this.rng(seed);\n    const pick = (arr) => arr[Math.floor(rnd() * arr.length)];\n\n    ctx.fillStyle = pal.bg; ctx.fillRect(0, 0, W, H);\n\n    // focal circle (figure/ground)\n    const fcx = W * (0.30 + rnd() * 0.12), fcy = H * (0.40 + rnd() * 0.18);\n    const fr = H * (0.40 + rnd() * 0.14);\n    const inside = (x, y, s) => {\n      const cx = x + s / 2, cy = y + s / 2;\n      return Math.hypot(cx - fcx, cy - fcy) < fr;\n    };\n\n    const lvl = Math.max(0, Math.min(4, Math.round(dens) - 1));\n    const cols = [10, 16, 22, 30, 40][lvl];\n    const maxDepth = [2, 3, 3, 4, 5][lvl];\n    const cell = W / cols;\n    const rows = Math.ceil(H / cell);\n\n    const motif = (x, y, s) => {\n      const bg = inside(x, y, s) ? pal.bgAlt : pal.bg;\n      ctx.fillStyle = bg; ctx.fillRect(x, y, s, s);\n      const cx = x + s / 2, cy = y + s / 2;\n      const t = rnd();\n      const a = pick(pal.colors), b = pick(pal.colors), c2 = pick(pal.colors);\n      ctx.save();\n      ctx.beginPath(); ctx.rect(x, y, s, s); ctx.clip();\n\n      if (t < 0.14) { // banded truchet arcs\n        const flip = rnd() < 0.5;\n        const corners = flip ? [[x, y, 0, Math.PI / 2], [x + s, y + s, Math.PI, Math.PI * 1.5]]\n                             : [[x + s, y, Math.PI / 2, Math.PI], [x, y + s, Math.PI * 1.5, Math.PI * 2]];\n        const bands = 4 + Math.floor(rnd() * 3);\n        for (let k = bands; k >= 1; k--) {\n          ctx.fillStyle = k % 2 === 0 ? a : b;\n          for (const [px, py, a0, a1] of corners) {\n            ctx.beginPath(); ctx.moveTo(px, py);\n            ctx.arc(px, py, (s / 2) * (k / bands), a0, a1); ctx.closePath(); ctx.fill();\n          }\n        }\n      } else if (t < 0.28) { // fine concentric rings\n        const n = 4 + Math.floor(rnd() * 4);\n        for (let i = n; i >= 1; i--) {\n          ctx.fillStyle = i % 2 === 0 ? a : b;\n          ctx.beginPath(); ctx.arc(cx, cy, (s / 2) * (i / n), 0, Math.PI * 2); ctx.fill();\n        }\n      } else if (t < 0.40) { // line hatching\n        const dir = Math.floor(rnd() * 3);\n        const n = 5 + Math.floor(rnd() * 5);\n        ctx.strokeStyle = a; ctx.lineWidth = s / (n * 2.4);\n        ctx.beginPath();\n        for (let i = 0; i <= n; i++) { const f = i / n;\n          if (dir === 0) { ctx.moveTo(x, y + f * s); ctx.lineTo(x + s, y + f * s); }\n          else if (dir === 1) { ctx.moveTo(x + f * s, y); ctx.lineTo(x + f * s, y + s); }\n          else { ctx.moveTo(x, y + f * s); ctx.lineTo(x + f * s, y); ctx.moveTo(x + f * s, y + s); ctx.lineTo(x + s, y + f * s); } }\n        ctx.stroke();\n      } else if (t < 0.50) { // nested squares (sometimes rotated)\n        const n = 4 + Math.floor(rnd() * 3);\n        if (rnd() < 0.4) { ctx.translate(cx, cy); ctx.rotate(Math.PI / 4); ctx.translate(-cx, -cy); }\n        for (let i = n; i >= 1; i--) {\n          ctx.fillStyle = i % 2 === 0 ? a : b;\n          const k = (s / 2) * (i / n);\n          ctx.fillRect(cx - k, cy - k, k * 2, k * 2);\n        }\n      } else if (t < 0.60) { // radial sunburst\n        const spokes = (4 + Math.floor(rnd() * 6)) * 2;\n        ctx.fillStyle = a;\n        for (let i = 0; i < spokes; i++) {\n          const a0 = (i / spokes) * Math.PI * 2, a1 = ((i + 0.5) / spokes) * Math.PI * 2;\n          ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, s * 0.72, a0, a1); ctx.closePath(); ctx.fill();\n        }\n        ctx.fillStyle = b; ctx.beginPath(); ctx.arc(cx, cy, s * 0.16, 0, Math.PI * 2); ctx.fill();\n      } else if (t < 0.68) { // half disc + inner\n        const dir = Math.floor(rnd() * 4);\n        const start = [0, Math.PI / 2, Math.PI, Math.PI * 1.5][dir];\n        ctx.fillStyle = a; ctx.beginPath(); ctx.moveTo(cx, cy);\n        ctx.arc(cx, cy, s / 2, start, start + Math.PI); ctx.fill();\n        ctx.fillStyle = b; ctx.beginPath(); ctx.moveTo(cx, cy);\n        ctx.arc(cx, cy, s / 3.2, start, start + Math.PI); ctx.fill();\n      } else if (t < 0.77) { // quarter pie nested bands\n        const corner = Math.floor(rnd() * 4);\n        const pts = [[x, y, 0], [x + s, y, Math.PI / 2], [x + s, y + s, Math.PI], [x, y + s, Math.PI * 1.5]];\n        const [px, py, ang] = pts[corner];\n        const bands = 4 + Math.floor(rnd() * 3);\n        for (let k = bands; k >= 1; k--) {\n          ctx.fillStyle = k % 2 === 0 ? a : b;\n          ctx.beginPath(); ctx.moveTo(px, py);\n          ctx.arc(px, py, s * (k / bands), ang, ang + Math.PI / 2); ctx.closePath(); ctx.fill();\n        }\n      } else if (t < 0.86) { // nested triangles\n        const flip = rnd() < 0.5;\n        const tri = (sc, col) => { ctx.fillStyle = col; ctx.beginPath();\n          if (flip) { ctx.moveTo(x, y); ctx.lineTo(x + s * sc, y); ctx.lineTo(x, y + s * sc); }\n          else { ctx.moveTo(x + s, y); ctx.lineTo(x + s, y + s * sc); ctx.lineTo(x + s - s * sc, y); }\n          ctx.closePath(); ctx.fill(); };\n        tri(1, a); tri(0.62, b); tri(0.3, c2);\n      } else if (t < 0.93) { // checkerboard sub-grid\n        const g = 3 + Math.floor(rnd() * 3), u = s / g;\n        ctx.fillStyle = a;\n        for (let i = 0; i < g; i++) for (let j = 0; j < g; j++)\n          if ((i + j) % 2 === 0) ctx.fillRect(x + i * u, y + j * u, u, u);\n      } else { // fine dot grid\n        ctx.fillStyle = a; const g = 4 + Math.floor(rnd() * 2);\n        for (let i = 0; i < g; i++) for (let j = 0; j < g; j++) {\n          ctx.beginPath(); ctx.arc(x + (i + 0.5) * s / g, y + (j + 0.5) * s / g, s / (g * 3.4), 0, Math.PI * 2); ctx.fill();\n        }\n      }\n      ctx.restore();\n      // crisp separator\n      ctx.strokeStyle = pal.line; ctx.lineWidth = Math.max(1, s * 0.01);\n      ctx.strokeRect(x + 0.5, y + 0.5, s, s);\n    };\n\n    const quad = (x, y, s, depth) => {\n      if (depth < maxDepth && rnd() < 0.5) {\n        const h = s / 2;\n        quad(x, y, h, depth + 1); quad(x + h, y, h, depth + 1);\n        quad(x, y + h, h, depth + 1); quad(x + h, y + h, h, depth + 1);\n      } else { motif(x, y, s); }\n    };\n\n    for (let r = 0; r < rows; r++)\n      for (let c = 0; c < cols; c++) quad(c * cell, r * cell, cell, 0);\n\n    // large structural concentric rings as overlay\n    ctx.globalAlpha = pal === this.PALETTES.Sandstone ? 0.10 : 0.14;\n    ctx.strokeStyle = pal.colors[3];\n    for (let i = 1; i <= 5; i++) {\n      ctx.lineWidth = 2.5;\n      ctx.beginPath(); ctx.arc(fcx, fcy, fr * (i / 3.2), 0, Math.PI * 2); ctx.stroke();\n    }\n    ctx.globalAlpha = 1;\n  }\n\n  redraw = () => this.draw();\n  componentDidMount() {\n    this.setState({\n      palette: this.props.palette ?? 'Nocturne',\n      density: this.props.density ?? 3,\n      seed: this.props.seed ?? 7,\n    }, this.redraw);\n  }\n  componentDidUpdate(prevProps) {\n    const p = prevProps || {};\n    const patch = {};\n    if (p.palette !== this.props.palette && this.props.palette != null) patch.palette = this.props.palette;\n    if (p.density !== this.props.density && this.props.density != null) patch.density = this.props.density;\n    if (p.seed !== this.props.seed && this.props.seed != null) patch.seed = this.props.seed;\n    if (Object.keys(patch).length) this.setState(patch, this.redraw);\n  }\n\n  download = () => {\n    const cv = this.canvasRef.current; if (!cv) return;\n    cv.toBlob((blob) => {\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = `geometric-${(this.state.palette||this.props.palette||'art').toLowerCase()}-4k.png`;\n      document.body.appendChild(a); a.click(); a.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 1000);\n    }, 'image/png');\n  };\n\n  renderVals() {\n    const palName = this.state.palette ?? this.props.palette ?? 'Nocturne';\n    const dens = this.state.density ?? this.props.density ?? 3;\n    const seedV = this.state.seed ?? this.props.seed ?? 7;\n    const swatches = Object.keys(this.PALETTES).map((name) => {\n      const p = this.PALETTES[name];\n      const sel = name === palName;\n      return {\n        name,\n        onClick: () => this.setState({ palette: name }, this.redraw),\n        style: {\n          width: '22px', height: '22px', borderRadius: '6px', border: 'none',\n          cursor: 'pointer', padding: 0, flex: '0 0 auto',\n          background: `linear-gradient(135deg, ${p.colors[0]} 0 38%, ${p.colors[2]} 38% 68%, ${p.colors[1]} 68% 100%)`,\n          boxShadow: sel ? '0 0 0 2px #ffffff, 0 0 0 4px rgba(0,0,0,0.45)' : 'inset 0 0 0 1px rgba(255,255,255,0.18)',\n          transform: sel ? 'translateY(-1px)' : 'none',\n          transition: 'transform 0.12s ease',\n        },\n      };\n    });\n    return {\n      canvasRef: this.canvasRef,\n      download: this.download,\n      shuffle: () => this.setState({ seed: 1 + Math.floor(Math.random() * 999) }, this.redraw),\n      onDensity: (e) => this.setState({ density: +e.target.value }, this.redraw),\n      seed: seedV,\n      onSeed: (e) => { let v = parseInt(e.target.value, 10); if (!Number.isFinite(v)) return; v = Math.max(1, Math.min(999, v)); this.setState({ seed: v }, this.redraw); },\n      swatches,\n      density: dens,\n      caption: `${palName} · 3840 × 2160 · 16:9`,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
